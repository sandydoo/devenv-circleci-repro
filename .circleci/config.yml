version: 2.1
jobs:
  test:
    # resource_class: arm.medium
    machine:
      image: ubuntu-2404:current
    steps:
      - run:
          command: |
              sh <(curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install) --daemon
              mkdir -p ~/.config/nix
              echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
      - checkout
      - run:
          name: Install devenv
          command: |
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh
            nix profile add --accept-flake-config github:cachix/devenv
            export SKIP=no-commit-to-branch
            devenv test -v --trace-output stderr --trace-format full

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: htmlcov
workflows:
  version: 2
  test:
    jobs:
      - test
